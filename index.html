<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>IFC WASM Viewer</title>
  </head>
  <body>
    <main id="app" class="profile-pending">
      <section id="profileScreen" class="profile-screen" aria-label="Выбор профиля">
        <div class="profile-card">
          <p class="profile-kicker">Выбор профиля</p>
          <div class="profile-actions">
            <button id="profileKmBtn" class="profile-option" type="button">
              <strong>КМ</strong>
              <span>Текущий IFC Viewer</span>
            </button>
            <button id="profileBimBtn" class="profile-option" type="button">
              <strong>BIM</strong>
              <span>IFC/BIM Viewer</span>
            </button>
          </div>
        </div>
      </section>

      <section id="bimStub" class="bim-stub" hidden>
        <div class="profile-card">
          <p class="profile-kicker">Профиль BIM</p>
          <h1>BIM Viewer</h1>
          <p>Открывается рабочий IFC/BIM viewer.</p>
          <button id="backToProfilesBtn" class="secondary-action" type="button">Выбрать другой профиль</button>
        </div>
      </section>

      <section class="viewer-shell">
        <div id="viewport" class="viewport"></div>

        <button id="topBackBtn" class="action-button top-back-button" type="button" aria-label="Назад">
          <span aria-hidden="true">←</span>
          <span class="sr-only">Назад</span>
        </button>

        <div class="status-pill">
          <strong>IFC Viewer</strong>
          <span id="statusText">Загрузите IFC</span>
        </div>

        <input id="ifcInput" type="file" accept=".ifc,.ifczip" hidden />
        <input id="fragInput" type="file" accept=".frag" hidden />

        <button id="loadIfcBtn" class="floating-add" type="button" aria-label="Добавить IFC">
          <span>+</span>
        </button>

        <button id="shareModelBtn" class="action-button share-button" type="button" aria-label="Ссылка на модель" hidden>
          <span aria-hidden="true">📎</span>
          <span class="sr-only">Ссылка на модель</span>
        </button>

        <div id="loadingOverlay" class="loading-overlay" hidden>
          <div class="loading-card" role="status" aria-live="polite">
            <span class="loading-spinner" aria-hidden="true"></span>
            <strong id="loadingTitle">Загрузка модели</strong>
            <span id="loadingStatus">Подготовка...</span>
          </div>
        </div>

        <section id="libraryModal" class="library-modal" aria-label="Библиотека фрагментов" hidden>
          <div class="library-sheet">
            <div class="library-header">
              <strong>Фрагменты</strong>
              <button id="closeLibraryBtn" class="plain-button" type="button" aria-label="Закрыть">×</button>
            </div>

            <div id="libraryStart" class="library-actions">
              <button id="addIfcBtn" class="library-action" type="button">
                <strong>Загрузить новую модель</strong>
                <span>Выбрать новый IFC до 200 МБ</span>
              </button>
              <button id="chooseFragmentBtn" class="library-action" type="button">
                <strong>Выбрать загруженную модель</strong>
                <span>Загрузить сохранённый fragment на сцену</span>
              </button>
              <div id="exampleList" class="example-list" aria-label="Открыть пример"></div>
            </div>

            <div id="libraryListPanel" class="library-list-panel" hidden>
              <button id="libraryBackBtn" class="plain-button back-button" type="button">← Назад</button>
              <div id="fragmentList" class="fragment-list"></div>
            </div>
          </div>
        </section>

        <section id="shareModal" class="share-modal" aria-label="Внешняя ссылка на модель" hidden>
          <div class="share-sheet">
            <div class="library-header">
              <strong>Ссылка на модель</strong>
              <button id="closeShareBtn" class="plain-button" type="button" aria-label="Закрыть">×</button>
            </div>
            <p id="shareModelName" class="share-description">Сохранённая модель</p>
            <div class="share-row">
              <input id="shareLinkInput" class="share-input" type="text" readonly />
              <button id="copyShareBtn" class="icon-button copy-share" type="button">Копировать</button>
            </div>
            <span id="shareCopyStatus" class="share-copy-status" aria-live="polite"></span>
          </div>
        </section>

        <div class="action-rail" aria-label="Действия модели">
          <button id="saveFragmentBtn" class="action-button save-fragment" type="button" aria-label="Сохранить fragment" hidden>
            <span aria-hidden="true">💾</span>
            <span class="sr-only">Сохранить fragment</span>
          </button>

          <button id="searchToggleBtn" class="action-button floating-search" type="button" aria-label="Поиск" hidden>
            <span aria-hidden="true">🔎</span>
          </button>

          <button id="homeViewBtn" class="action-button home-view" type="button" aria-label="Вернуть камеру домой" hidden>
            <span aria-hidden="true">🏠</span>
          </button>
        </div>

        <section id="searchPanel" class="search-panel" hidden>
          <div class="search-row">
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Поиск по всем атрибутам"
            />
            <button id="searchBtn" class="icon-button" type="button" aria-label="Найти">→</button>
            <button id="clearSearchBtn" class="icon-button" type="button" aria-label="Очистить">×</button>
          </div>
          <div id="searchOutput" class="search-output">
            <span class="empty-state">Введите текст поиска.</span>
          </div>
        </section>

        <div id="progress" class="progress" hidden>
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <aside class="side-panel" hidden>
        <strong id="fileName">-</strong>
        <strong id="modelCount">0</strong>
        <strong id="selectionCount">0</strong>
        <div id="treeOutput" class="tree-output"></div>
        <div id="propertiesOutput" class="properties-output"></div>
        <button id="loadFragBtn" type="button"></button>
        <button id="fitBtn" type="button"></button>
        <button id="clearBtn" type="button"></button>
        <button id="downloadFragBtn" type="button"></button>
        <button id="hideSelectedBtn" type="button"></button>
        <button id="isolateSelectedBtn" type="button"></button>
        <button id="showAllBtn" type="button"></button>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
