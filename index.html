<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC WASM Viewer</title>
  </head>
  <body>
    <main id="app">
      <section class="viewer-shell">
        <div id="viewport" class="viewport"></div>

        <div class="status-pill">
          <strong>IFC Viewer</strong>
          <span id="statusText">Загрузите IFC</span>
        </div>

        <input id="ifcInput" type="file" accept=".ifc,.ifczip" hidden />
        <input id="fragInput" type="file" accept=".frag" hidden />

        <button id="loadIfcBtn" class="floating-add" type="button" aria-label="Добавить IFC">
          <span>+</span>
        </button>

        <button id="searchToggleBtn" class="floating-search" type="button" aria-label="Поиск" hidden>
          🔎
        </button>

        <section id="searchPanel" class="search-panel" hidden>
          <div class="search-row">
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Поиск по всем атрибутам"
            />
            <button id="searchBtn" class="icon-button" type="button" aria-label="Найти">→</button>
            <button id="clearSearchBtn" class="icon-button" type="button" aria-label="Очистить">×</button>
          </div>
          <div id="searchOutput" class="search-output">
            <span class="empty-state">Введите текст поиска.</span>
          </div>
        </section>

        <bim-view-cube
          id="viewCube"
          size="56"
          right-text="+X"
          left-text="-X"
          top-text="+Y"
          bottom-text="-Y"
          front-text="+Z"
          back-text="-Z"
        ></bim-view-cube>

        <div id="progress" class="progress" hidden>
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <aside class="side-panel" hidden>
        <strong id="fileName">-</strong>
        <strong id="modelCount">0</strong>
        <strong id="selectionCount">0</strong>
        <div id="treeOutput" class="tree-output"></div>
        <div id="propertiesOutput" class="properties-output"></div>
        <button id="loadFragBtn" type="button"></button>
        <button id="fitBtn" type="button"></button>
        <button id="clearBtn" type="button"></button>
        <button id="downloadFragBtn" type="button"></button>
        <button id="hideSelectedBtn" type="button"></button>
        <button id="isolateSelectedBtn" type="button"></button>
        <button id="showAllBtn" type="button"></button>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
